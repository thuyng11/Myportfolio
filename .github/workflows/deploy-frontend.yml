name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'Myportfolio/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Myportfolio/package-lock.json

      - name: Install dependencies
        working-directory: Myportfolio
        run: npm ci

      - name: Build
        working-directory: Myportfolio
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

      - name: Copy 404.html for client-side routing
        run: cp Myportfolio/dist/index.html Myportfolio/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: Myportfolio/dist

      - uses: actions/deploy-pages@v4
        id: deployment
